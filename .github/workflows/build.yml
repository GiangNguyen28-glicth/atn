name: Pull and Package NiFi

on:
  workflow_dispatch:

jobs:
 build:
    runs-on: ubuntu-latest

    steps:
      - name: Pull NiFi image
        run: docker pull apache/nifi:1.28.1

      - name: Save and compress image
        run: docker save apache/nifi:1.28.1 | gzip > nifi-1.28.1.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nifi-image
          path: nifi-1.28.1.tar.gz
          retention-days: 3
